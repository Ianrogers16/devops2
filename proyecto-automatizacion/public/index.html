<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epicentro - Inventario</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>

    <header class="main-header">
        <h1>EPICENTRO</h1>
        <span>Gestión de Automatización</span>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="header-panel">
                <h2>Panel de Inventario</h2>
                <p>Introduce los datos para el cálculo automático.</p>
            </div>

            <div class="field">
                <label for="prod">Producto</label>
                <input type="text" id="prod" placeholder="Ej. Memoria USB">
            </div>

            <div class="field">
                <label for="cant">Cantidad</label>
                <input type="number" id="cant" placeholder="Ej. 10">
            </div>

            <div class="field">
                <label for="prec">Precio Unitario</label>
                <input type="number" id="prec" placeholder="Ej. 150.00">
            </div>

            <button id="btn-procesar">Calcular Automatización</button>

            <div id="resultado"></div>
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026  - Universidad TecMilenio</p>
        <p>Software Engineering Student</p>
    </footer>

    <script src="script/script.js"></script>
</body>
</html>
